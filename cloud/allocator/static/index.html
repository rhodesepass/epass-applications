<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>epass 云端试用</title>
<style>
  body { margin: 0; font-family: system-ui, sans-serif; background: #14161a;
         color: #e6e6e6; display: flex; min-height: 100vh;
         align-items: center; justify-content: center; }
  .card { max-width: 32rem; padding: 2.5rem; }
  h1 { font-size: 1.6rem; margin: 0 0 1rem; }
  p, li { line-height: 1.7; color: #b8bcc4; }
  button { font-size: 1.1rem; padding: .7rem 2.2rem; border: 0;
           border-radius: 8px; background: #3a7afe; color: #fff;
           cursor: pointer; margin-top: 1.2rem; }
  button:hover { background: #5b90ff; }
  .notice { color: #ffb454; margin-top: 1rem; }
</style>
</head>
<body>
<div class="card">
  <h1>epass 云端开发试用</h1>
  <p>点下面的按钮进入一个云端开发环境:浏览器里的 VS Code + Claude Code,
     对 agent 提需求,它给你编出 epass 应用的浏览器预览和设备安装包。</p>
  <ul>
    <li>试用会话 <b>60 分钟无活动自动销毁</b>,请收藏会话 URL,凭它可回到会话</li>
    <li>销毁前作品会自动归档,但请及时从预览页下载安装包</li>
  </ul>
  <form method="post" action="/new"><button>开始试用</button></form>
  <p class="notice">{{NOTICE}}</p>
</div>
</body>
</html>
